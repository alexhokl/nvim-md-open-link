version: "3"

vars:
  NLUA: /Users/alex/.luarocks/bin/nlua

tasks:
  setup:
    desc: "Install nlua and busted via luarocks (Lua 5.1 for nlua/Neovim compatibility)"
    cmds:
      - luarocks --local --lua-version 5.1 install nlua
      - luarocks --local --lua-version 5.1 install busted

  test:
    desc: "Run all tests"
    cmds:
      - |
        eval "$(luarocks --lua-version 5.1 path)" && \
        busted --lua {{.NLUA}} spec/
  # test:
  #   desc: Run unit tests with busted
  #   cmds:
  #     - busted spec

  test:verbose:
    desc: Run unit tests with verbose output
    cmds:
      - |
        eval "$(luarocks --lua-version 5.1 path)" && \
        busted --lua {{.NLUA}} --verbose spec/

  test:file:
    desc: Run a specific test file (FILE=spec/xxx_spec.lua)
    cmds:
      - |
        eval "$(luarocks --lua-version 5.1 path)" && \
        busted --lua {{.NLUA}} {{.FILE}}
    requires:
      vars: [FILE]
